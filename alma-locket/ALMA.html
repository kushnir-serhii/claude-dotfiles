<style>
/* ALMA — design tokens & base styles
   Moon Mode (dark espresso, default) + Sun Mode (light sand) */

@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

:root {
  --accent: #4839F4;
  --accent-press: #7C4DF0;
  --font: 'Outfit', -apple-system, system-ui, sans-serif;
  --ease: cubic-bezier(0.4, 0.0, 0.1, 1);
  --ease-spring: cubic-bezier(0.34, 1.3, 0.64, 1);
}

/* ── Moon Mode (dark espresso / black canvas) ── */
.alma[data-theme="moon"] {
  --bg-0: #0E0B09;
  --bg-1: #161210;
  --bg-grad: radial-gradient(130% 90% at 50% 8%, #221C19 0%, #161210 42%, #0C0A08 100%);
  --surface: rgba(255,255,255,0.045);
  --surface-2: rgba(255,255,255,0.07);
  --surface-press: rgba(255,255,255,0.10);
  --surface-solid: #211B18;
  --text: #F4F1EC;
  --text-2: #ACA59D;          /* warm neutral gray */
  --text-3: #837C73;          /* dim warm gray */
  --hairline: rgba(255,255,255,0.085);
  --hairline-strong: rgba(255,255,255,0.14);
  --accent-soft: color-mix(in srgb, var(--accent) 16%, transparent);
  --accent-glow: color-mix(in srgb, var(--accent) 45%, transparent);
  --shadow: 0 18px 50px rgba(0,0,0,0.55);
  --mandala-opacity: 0.15;
  --on-accent: #fff;
  --statusbar: light;
}

/* ── Sun Mode (light sand variant) ── */
.alma[data-theme="sun"] {
  --bg-0: #F6F1EA;
  --bg-1: #FAF7F2;
  --bg-grad: radial-gradient(130% 90% at 50% 6%, #FEFCF9 0%, #F8F3EC 46%, #F0E9DE 100%);
  --surface: rgba(43,33,24,0.05);
  --surface-2: rgba(43,33,24,0.08);
  --surface-press: rgba(43,33,24,0.11);
  --surface-solid: #FDFAF6;
  --text: #2B2118;
  --text-2: #524A43;          /* warm neutral gray — AA 6.5:1 on bg-0 */
  --text-3: #6E665E;          /* dim warm gray — AA 4.6:1 on bg-0 */
  --hairline: rgba(43,33,24,0.10);
  --hairline-strong: rgba(43,33,24,0.16);
  --accent-soft: color-mix(in srgb, var(--accent) 13%, transparent);
  --accent-glow: color-mix(in srgb, var(--accent) 30%, transparent);
  --shadow: 0 18px 50px rgba(80,60,40,0.18);
  --mandala-opacity: 0.16;
  --on-accent: #fff;
  --statusbar: dark;
}

* { box-sizing: border-box; }

.alma {
  font-family: var(--font);
  color: var(--text);
  background: var(--bg-grad);
  height: 100%;
  width: 100%;
  position: relative;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  transition: background 600ms var(--ease), color 400ms var(--ease);
  -webkit-tap-highlight-color: transparent;
}

.alma button { font-family: var(--font); cursor: pointer; border: none; background: none; color: inherit; }
.alma ::-webkit-scrollbar { width: 0; height: 0; }

/* scrolling screen body */
.scrollbody {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.scrollbody::-webkit-scrollbar { display: none; }

/* generic pressable */
.press { transition: transform 140ms var(--ease), background 160ms var(--ease), opacity 160ms var(--ease); }
.press:active { transform: scale(0.96); }

/* horizontal carousels */
.hscroll {
  display: flex;
  gap: 14px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-padding-left: 20px;
  padding: 2px 20px 4px 0;
  margin: 0 -20px;
  scrollbar-width: none;
}
.hscroll::-webkit-scrollbar { display: none; }
.hscroll > * { scroll-snap-align: start; flex-shrink: 0; }
.hscroll > *:first-child { margin-left: 20px; }

/* section label */
.eyebrow {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: var(--text-2);
}

@keyframes almaFadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes almaFade { from { opacity: 0; } to { opacity: 1; } }

/* mandala motion */
@keyframes spinCW  { to { transform: rotate(360deg); } }
@keyframes spinCCW { to { transform: rotate(-360deg); } }
@keyframes breathe {
  0%, 100% { transform: scale(0.98); }
  50%      { transform: scale(1.02); }
}
@keyframes almaMorph {
  0%   { opacity: 0; transform: scale(0.94); }
  6%   { opacity: 1; transform: scale(1); }
  16%  { opacity: 1; transform: scale(1.03); }
  20%  { opacity: 0; transform: scale(1.08); }
  100% { opacity: 0; transform: scale(0.94); }
}
@media (prefers-reduced-motion: reduce) {
  .mandala-cw, .mandala-ccw, .mandala-breathe { animation: none !important; }
}

/* toast */
@keyframes toastIn {
  from { opacity: 0; transform: transl(-50%, 16px); }
  to   { opacity: 1; transform: translate(-50%, 0); }
}

</style>

// ALMA — Morphing mandala for the full-screen player.
// 4 mandala variations crossfade in a continuous loop over the track's hero image.
// Rendered in white with transparency, slowly rotates, gently breathes.

function Mandala({ active = true, size = 380 }) {
  const C = 200;       // SVG center
  const W = '#FFFFFF'; // white stroke

  // helpers
  const ring = (n, r, render) =>
    Array.from({ length: n }, (_, i) => {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2;
      const x = C + Math.cos(a) * r;
      const y = C + Math.sin(a) * r;
      return <g key={i}>{render(x, y, ((a + Math.PI / 2) * 180) / Math.PI)}</g>;
    });
  const starPts = (r1, r2, n) =>
    Array.from({ length: n * 2 }, (_, i) => {
      const r = i % 2 === 0 ? r1 : r2;
      const a = (i / (n * 2)) * Math.PI * 2 - Math.PI / 2;
      return `${C + Math.cos(a) * r},${C + Math.sin(a) * r}`;
    }).join(' ');
  const polyPts = (r, n, offset = 0) =>
    Array.from({ length: n }, (_, i) => {
      const a = (i / n) * Math.PI * 2 - Math.PI / 2 + offset;
      return `${C + Math.cos(a) * r},${C + Math.sin(a) * r}`;
    }).join(' ');

  const s = (sw = 1.1) => ({ stroke: W, fill: 'none', strokeWidth: sw, strokeLinecap: 'round', strokeLinejoin: 'round' });

  // ── Shape A — Flower-of-Life lotus, 12 petal circles + outer ring
  const ShapeA = (
    <g>
      <circle cx={C} cy={C} r="172" {...s(0.8)} />
      <circle cx={C} cy={C} r="156" {...s(1.0)} />
      {ring(12, 100, (x, y) => <circle cx={x} cy={y} r="56" {...s(0.9)} />)}
      <circle cx={C} cy={C} r="56" {...s(1.0)} />
      <circle cx={C} cy={C} r="22" {...s(1.0)} />
    </g>
  );

  // ── Shape B — Hexagram inside circle + 6 petal rounds
  const ShapeB = (
    <g>
      <circle cx={C} cy={C} r="170" {...s(0.8)} />
      <circle cx={C} cy={C} r="150" {...s(1.0)} />
      <polygon points={polyPts(140, 3, 0)} {...s(1.0)} />
      <polygon points={polyPts(140, 3, Math.PI)} {...s(1.0)} />
      {ring(6, 95, (x, y) => <circle cx={x} cy={y} r="42" {...s(0.9)} />)}
      <circle cx={C} cy={C} r="42" {...s(1.0)} />
      <circle cx={C} cy={C} r="18" {...s(1.0)} />
    </g>
  );

  // ── Shape C — 8-pointed star, square frame
  const ShapeC = (
    <g>
      <circle cx={C} cy={C} r="172" {...s(0.8)} />
      <polygon points={polyPts(160, 4, 0)} {...s(1.0)} />
      <polygon points={polyPts(160, 4, Math.PI / 4)} {...s(1.0)} />
      <polygon points={starPts(140, 90, 8)} {...s(1.0)} />
      <polygon points={starPts(100, 60, 8)} {...s(1.0)} transform={`rotate(22.5 ${C} ${C})`} />
      <circle cx={C} cy={C} r="34" {...s(1.0)} />
      <circle cx={C} cy={C} r="14" {...s(1.0)} />
    </g>
  );

  // ── Shape D — 12-point sunburst star with dots
  const ShapeD = (
    <g>
      <circle cx={C} cy={C} r="172" {...s(0.8)} />
      <polygon points={starPts(170, 110, 12)} {...s(1.0)} />
      <polygon points={starPts(120, 70, 12)} {...s(0.9)} transform={`rotate(15 ${C} ${C})`} />
      {ring(24, 145, (x, y) => <circle cx={x} cy={y} r="1.8" fill={W} />)}
      <circle cx={C} cy={C} r="44" {...s(1.0)} />
      {ring(12, 44, (x, y) => <circle cx={x} cy={y} r="1.6" fill={W} />)}
      <circle cx={C} cy={C} r="16" {...s(1.0)} />
    </g>
  );

  // ── Shape E — Many-petal flower (24 petals)
  const ShapeE = (
    <g>
      <circle cx={C} cy={C} r="170" {...s(0.8)} />
      {ring(24, 120, (x, y, deg) => (
        <ellipse cx={x} cy={y} rx="9" ry="36"
          transform={`rotate(${deg} ${x} ${y})`} {...s(0.9)} />
      ))}
      <circle cx={C} cy={C} r="62" {...s(1.0)} />
      {ring(12, 62, (x, y) => <circle cx={x} cy={y} r="2.2" fill={W} />)}
      <circle cx={C} cy={C} r="22" {...s(1.0)} />
    </g>
  );

  // 5 shapes × 5s slot = 25s loop. Same keyframe (almaMorph), staggered by +5s each.
  // Visible windows (of 25s wall-time): A 0-5, B 5-10, C 10-15, D 15-20, E 20-25.
  const slotDelay = (idx) => `${idx * 5}s`;

  const shapeStyle = (idx) => ({
    transformOrigin: '200px 200px',
    transformBox: 'fill-box',
    animation: active ? `almaMorph 25s ease-in-out infinite` : 'none',
    animationDelay: slotDelay(idx),
    opacity: 0, // initial; overridden by animation
  });

  return (
    <div style={{
      width: size, height: size, opacity: 0.55,
      animation: active ? 'breathe 9s ease-in-out infinite' : 'none',
      willChange: 'transform',
      mixBlendMode: 'screen',
    }}>
      <svg viewBox="0 0 400 400" width="100%" height="100%" style={{ overflow: 'visible' }}>
        {/* Slow global rotation gives morph a sense of constant motion */}
        <g style={{
          transformOrigin: '200px 200px',
          animation: active ? 'spinCW 240s linear infinite' : 'none',
        }}>
          <g style={shapeStyle(0)}>{ShapeA}</g>
          <g style={shapeStyle(1)}>{ShapeB}</g>
          <g style={shapeStyle(2)}>{ShapeC}</g>
          <g style={shapeStyle(3)}>{ShapeD}</g>
          <g style={shapeStyle(4)}>{ShapeE}</g>
        </g>
      </svg>
    </div>
  );
}

// ── Draggable / tappable progress timeline ──
function Scrubber({ elapsed, total, onSeek }) {
  const barRef = useRefP(null);
  const [drag, setDrag] = useStateP(false);
  const pct = Math.max(0, Math.min(1, elapsed / total));

  const seekFromEvent = (clientX) => {
    const el = barRef.current; if (!el) return;
    const r = el.getBoundingClientRect();
    onSeek(Math.max(0, Math.min(1, (clientX - r.left) / r.width)) * total);
  };
  const down = (e) => { setDrag(true); seekFromEvent(e.clientX ?? e.touches?.[0]?.clientX); };
  useEffectP(() => {
    if (!drag) return;
    const move = (e) => seekFromEvent(e.clientX ?? e.touches?.[0]?.clientX);
    const up = () => setDrag(false);
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
    return () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
  }, [drag]);

  return (
    <div style={{ width: '100%' }}>
      <div ref={barRef} className="press" onPointerDown={down} style={{
        height: 22, display: 'flex', alignItems: 'center', cursor: 'pointer', touchAction: 'none',
      }}>
        <div style={{ position: 'relative', width: '100%', height: 4, borderRadius: 4, background: 'rgba(255,255,255,0.22)' }}>
          <div style={{ position: 'absolute', inset: 0, width: `${pct * 100}%`, background: '#fff', borderRadius: 4 }} />
          <div style={{
            position: 'absolute', top: '50%', left: `${pct * 100}%`,
            width: drag ? 16 : 12, height: drag ? 16 : 12, borderRadius: '50%', background: '#fff',
            transform: 'translate(-50%, -50%)', boxShadow: '0 2px 6px rgba(0,0,0,0.4)',
            transition: 'width 120ms, height 120ms',
          }} />
        </div>
      </div>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4, fontSize: 13, fontWeight: 500, color: 'rgba(255,255,255,0.65)', fontVariantNumeric: 'tabular-nums' }}>
        <span>{fmtTime(elapsed)}</span>
        <span>-{fmtTime(Math.max(0, total - elapsed))}</span>
      </div>
    </div>
  );
}

// ── Compacted Mini-Player pill ──
function MiniPlayer({ track, duration, elapsed, isPlaying, mode, onExpand, onTogglePlay, onClose }) {
  const total = duration * 60;
  const pct = Math.max(0, Math.min(1, elapsed / total));
  const show = mode === 'mini';

  // swipe-left-to-dismiss
  const swipeRef = useRefP(null);
  const [swipeDx, setSwipeDx] = useStateP(0);
  const onPointerDown = (e) => { swipeRef.current = { startX: e.clientX, startY: e.clientY, moved: false }; };
  const onPointerMove = (e) => {
    if (!swipeRef.current) return;
    const dx = e.clientX - swipeRef.current.startX;
    const dy = e.clientY - swipeRef.current.startY;
    if (!swipeRef.current.moved && Math.abs(dy) > Math.abs(dx)) { swipeRef.current = null; return; }
    if (dx < 0) { swipeRef.current.moved = true; setSwipeDx(dx); }
  };
  const onPointerUp = () => {
    if (swipeRef.current?.moved && swipeDx < -80) { onClose?.(); }
    swipeRef.current = null;
    setSwipeDx(0);
  };

  return (
    <div style={{
      position: 'absolute', left: 14, right: 14, bottom: 96, zIndex: 45,
      transform: show ? `translateY(0) translateX(${swipeDx}px)` : 'translateY(140%)',
      opacity: show ? Math.max(0, 1 + swipeDx / 200) : 0,
      transition: swipeDx !== 0 ? 'none' : 'transform 440ms var(--ease-spring), opacity 240ms var(--ease)',
      pointerEvents: show ? 'auto' : 'none',
    }}
      onPointerDown={onPointerDown} onPointerMove={onPointerMove} onPointerUp={onPointerUp} onPointerCancel={onPointerUp}
    >
      <div className="press" onClick={onExpand} style={{
        position: 'relative', display: 'flex', alignItems: 'center', gap: 12,
        padding: 8, paddingRight: 18, borderRadius: 20, overflow: 'hidden',
        background: 'var(--surface-solid)', border: '1px solid var(--hairline-strong)',
        boxShadow: 'var(--shadow)', cursor: 'pointer',
      }}>
        <button className="press" onClick={(e) => { e.stopPropagation(); onTogglePlay(); }} aria-label={isPlaying ? 'Pause' : 'Play'} style={{
          width: 44, height: 44, borderRadius: 14, flexShrink: 0,
          background: 'var(--text)', color: 'var(--bg-0)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          {isPlaying ? <IconPause size={20} /> : <IconPlay size={18} style={{ marginLeft: 2 }} />}
        </button>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 15, fontWeight: 600, color: 'var(--text)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{track?.title}</div>
          <div style={{ fontSize: 12.5, color: 'var(--text-2)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{fmtTime(Math.max(0, total - elapsed))} left · {track?.sub || track?.layers}</div>
        </div>
        <Orb grad={track?.grad} size={32} radius={10} />
        {/* thin progress along bottom edge — grayscale */}
        <div style={{ position: 'absolute', left: 0, bottom: 0, height: 2.5, width: `${pct * 100}%`, background: 'var(--text)', transition: 'width 400ms linear' }} />
      </div>
    </div>
  );
}

const { useState: useStateM, useEffect: useEffectM, useRef: useRefM } = React;

function MixerDurationPicker({ value, onChange }) {
  const [customMode, setCustomMode] = useStateM(false);
  const [customInput, setCustomInput] = useStateM('');
  const presets = [5, 15, 30];
  const isPreset = presets.includes(value);

  const activateCustom = () => {
    setCustomMode(true);
    setCustomInput(isPreset ? '' : String(value));
  };

  const onInputChange = (e) => {
    const raw = e.target.value.replace(/\D/g, '');
    setCustomInput(raw);
    const n = parseInt(raw, 10);
    if (n > 0 && n <= 360) onChange(n);
  };

  return (
    <div style={{ display: 'flex', gap: 8 }}>
      {presets.map(min => {
        const active = value === min && !customMode;
        return (
          <button key={min} className="press" onClick={() => { onChange(min); setCustomMode(false); }} style={{
            flex: '1 1 0', padding: '11px 8px', borderRadius: 14,
            background: active ? 'var(--text)' : 'var(--surface)',
            color: active ? 'var(--bg-0)' : 'var(--text-2)',
            border: active ? 'none' : '1px solid var(--hairline)',
            fontSize: 15, fontWeight: 600,
            transition: 'background 200ms var(--ease), color 200ms var(--ease)',
          }}>{min} min</button>
        );
      })}
      {customMode ? (
        <div style={{
          flex: '1 1 0', display: 'flex', alignItems: 'center', justifyContent: 'center',
          borderRadius: 14, background: 'var(--text)', padding: '6px 8px',
        }}>
          <input
            autoFocus
            type="text" inputMode="numeric" pattern="[0-9]*"
            value={customInput}
            onChange={onInputChange}
            placeholder="min"
            style={{
              width: '100%', background: 'transparent', border: 'none', outline: 'none',
              color: 'var(--bg-0)', fontSize: 15, fontWeight: 600,
              textAlign: 'center', fontFamily: 'var(--font)',
            }}
          />
        </div>
      ) : (
        <button className="press" onClick={activateCustom} style={{
          flex: '1 1 0', padding: '11px 8px', borderRadius: 14,
          background: 'var(--surface)', color: 'var(--text-2)',
          border: '1px solid var(--hairline)', fontSize: 15, fontWeight: 600,
        }}>Custom</button>
      )}
    </div>
  );
}

// D — Pre-Hear & Launch Action Bar (rendered at device level, pinned, stacks above mini-player)
function MixerActionBar({ focus, dur, layer, bell, raised, onBegin, onPreviewMix }) {
  const [isPreviewing, setIsPreviewing] = useStateM(false);
  const previewRefs = useRefM([]);

  const stopAll = () => {
    previewRefs.current.forEach(a => { try { a.pause(); } catch(e) {} });
    previewRefs.current = [];
    setIsPreviewing(false);
  };

  const handlePreview = () => {
    if (isPreviewing) { stopAll(); return; }
    if (!focus?.audioSrc) return;

    const audios = [];

    // main track
    const main = new Audio(focus.audioSrc);
    main.volume = 0.75; main.loop = true;
    main.play().catch(() => {});
    audios.push(main);

    // ambient layer
    if (layer?.audioSrc) {
      const lyr = new Audio(layer.audioSrc);
      lyr.volume = 0.45; lyr.loop = true;
      lyr.play().catch(() => {});
      audios.push(lyr);
    }

    // session bell (one-shot at start)
    if (bell?.audioSrc) {
      const b = new Audio(bell.audioSrc);
      b.volume = 0.85;
      setTimeout(() => b.play().catch(() => {}), 400);
      audios.push(b);
    }

    previewRefs.current = audios;
    setIsPreviewing(true);
    setTimeout(stopAll, 15000);
  };

  return (
    <div style={{
      position: 'absolute', left: 14, right: 14, zIndex: 44,
      bottom: raised ? 158 : 98,
      transition: 'bottom 360ms var(--ease-spring)',
    }}>
      <div style={{
        display: 'flex', gap: 11, padding: 10, borderRadius: 22,
        background: 'var(--surface-solid)', border: '1px solid var(--hairline-strong)', boxShadow: 'var(--shadow)',
      }}>
        <button className="press" onClick={handlePreview} disabled={!focus} style={{
          flex: '0 0 130px', padding: '15px 0', borderRadius: 15,
          background: 'var(--surface-2)', border: '1px solid var(--hairline)',
          color: focus ? 'var(--text)' : 'var(--text-3)', fontSize: 14.5, fontWeight: 600,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 7,
          opacity: focus ? 1 : 0.5, whiteSpace: 'nowrap',
        }}>
          {isPreviewing ? <IconStop size={18} /> : <IconWave size={18} />}
          {isPreviewing ? 'Stop' : 'Pre-listen'}

                  <button key={i.id} className="press" onClick={() => setIcon(i.id)} aria-label={i.label} style={{
                    aspectRatio: '1 / 1', borderRadius: 14,
                    background: on ? 'var(--surface-2)' : 'transparent',
                    border: `1px solid ${on ? 'var(--text)' : 'var(--hairline)'}`,
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    color: on ? 'var(--text)' : 'var(--text-2)',
                    transition: 'background 180ms var(--ease), border-color 180ms var(--ease), color 180ms var(--ease)',
                  }}>
                    <Comp size={20} />
                  </button>
                );
              })}
            </div>

            <button className="press" onClick={commit} style={{
              width: '100%', padding: '16px', borderRadius: 18,
              background: 'var(--accent)', color: 'var(--on-accent)',
              fontSize: 16, fontWeight: 600, boxShadow: '0 10px 26px -8px var(--accent-glow)',
              display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9, whiteSpace: 'nowrap',
            }}>
              <IconCheck size={18} /> {file._isNew ? 'Add to Vault' : 'Save'}
            </button>
          </>
        )}
      </div>
    </>
  );
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

  "mandalaMotion": true

const ACCENTS = ['#4839F4', 'oklch(0.62 0.19 265)', 'oklch(0.64 0.16 195)', 'oklch(0.64 0.17 350)', 'oklch(0.68 0.15 70)'];

// ── Audio engine ────────────────────────────────────────────────────────────
function useAudioEngine() {
  const mainRef = useRefA(null);
  const layerRef = useRefA(null);

  const getMain = () => {
    if (!mainRef.current) { mainRef.current = new Audio(); mainRef.current.loop = true; mainRef.current.volume = 0.85; }
    return mainRef.current;
  };
  const getLayer = () => {
    if (!layerRef.current) { layerRef.current = new Audio(); layerRef.current.loop = true; layerRef.current.volume = 0.45; }
    return layerRef.current;
  };

  const play = (mainSrc, layerSrc) => {
    if (mainSrc) {
      const m = getMain();
      const abs = new URL(mainSrc, location.href).href;
      if (m.src !== abs) { m.src = mainSrc; }
      m.play().catch(() => {});
    }
    if (layerSrc !== undefined) {
      if (!layerSrc) {
        layerRef.current?.pause();
      } else {
        const l = getLayer();
        const abs = new URL(layerSrc, location.href).href;
        if (l.src !== abs) { l.src = layerSrc; }
        l.play().catch(() => {});
      }
    }
  };

  const pause = () => { mainRef.current?.pause(); layerRef.current?.pause(); };

  const stop = () => {
    if (mainRef.current) { mainRef.current.pause(); mainRef.current.src = ''; }
    if (layerRef.current) { layerRef.current.pause(); layerRef.current.src = ''; }
  };

  const setMuted = (muted) => {
    if (mainRef.current) mainRef.current.muted = muted;
    if (layerRef.current) layerRef.current.muted = muted;
  };

  const previewSrc = (src) => {
    const a = new Audio(src);
    a.volume = 0.6;
    a.play().catch(() => {});
    setTimeout(() => a.pause(), 10000);
  };

  return { play, pause, stop, setMuted, previewSrc };
}

  // pin file customizer
  const [editingFile, setEditingFile] = useStateA(null);
  const onEditFile = (f) => setEditingFile(f);
  const onSavePinCustomization = (id, patch) => {
    setRawAudio(ra => {
      const exists = ra.some(f => f.id === id);
      if (exists) return ra.map(f => f.id === id ? { ...f, ...patch } : f);
      // new import — add with chosen customizations, strip internal flag
      const { _isNew, ...base } = editingFileRef.current || {};
      return [...ra, { ...base, ...patch }];
    });
    fireToast(editingFileRef.current?._isNew ? `${patch.name || 'File'} added to Vault` : 'Pin updated');
  };
  // keep a ref so the save handler can read the current editingFile
  const editingFileRef = React.useRef(null);
  React.useEffect(() => { editingFileRef.current = editingFile; }, [editingFile]);

  const audio = useAudioEngine();

  useEffectA(() => {
    document.querySelector('.alma')?.setAttribute('data-theme', theme);
    localStorage.setItem('alma-theme', theme);
  }, [theme]);

  useEffectA(() => { audio.setMuted(muted); }, [muted]);

  // countdown engine
  useEffectA(() => {
    if (!isPlaying || playerMode === 'closed') return;
    const total = duration * 60;
    const id = setInterval(() => {
      setElapsed(e => {
        if (e + 1 >= total) { setIsPlaying(false); audio.pause(); return total; }
        return e + 1;
      });
    }, 1000);
    return () => clearInterval(id);
  }, [isPlaying, playerMode, duration]);

  // stop audio when player closes
  useEffectA(() => { if (playerMode === 'closed') audio.stop(); }, [playerMode]);

  // intro/outro bell — play when full player opens or session ends
  useEffectA(() => {
    if (playerMode === 'full' && mixBell?.isIntroOutro && mixBell?.audioSrc) {
      const b = new Audio(mixBell.audioSrc);
      b.volume = 0.85;
      setTimeout(() => b.play().catch(() => {}), 600);
    }
  }, [playerMode]);

  useEffectA(() => {
    const total = duration * 60;
    if (elapsed >= total && elapsed > 0 && mixBell?.isIntroOutro && mixBell?.audioSrc) {
      const b = new Audio(mixBell.audioSrc);
      b.volume = 0.85;
      b.play().catch(() => {});
    }
  }, [elapsed]);

  // interval bell — fires each time elapsed crosses a multiple of intervalMin minutes
  useEffectA(() => {
    if (!isPlaying || !mixBell?.isInterval || !mixBell?.audioSrc || elapsed === 0) return;
    const intervalSec = intervalMin * 60;
    if (elapsed % intervalSec === 0) {
      const b = new Audio(mixBell.audioSrc);
      b.volume = 0.85;
      b.play().catch(() => {});
    }
  }, [elapsed]);

  // ── session launch ──
  const beginSession = (tr, dur, layer, source = 'track') => {
    setTrack(layer ? { ...tr, sub: `${tr.sub} + ${layer.name}` } : tr);
    setDuration(dur || tr.dur || 15);
    setElapsed(0);
    setIsPlaying(true);
    setSessionSource(source);
    setPlayerMode('full');
    setConfigTrack(null);
    audio.play(tr.audioSrc, layer?.audioSrc || null);
  };

  const launchRitual = (r) => {
    setTrack({ ...r, sub: r.layers });
    setDuration(r.dur);
    setElapsed(0);
    setIsPlaying(true);
    setSessionSource('ritual');
    setPlayerMode('full');
    audio.play(r.audioSrc, r.layerSrc || null);
  };

  const playFile = (f) => {
    setTrack({ title: f.name, sub: f.meta, grad: f.color || f.grad, audioSrc: f.audioSrc });
    setDuration(15);
    setElapsed(0);
    setIsPlaying(true);
    setSessionSource('track');
    setPlayerMode('full');
    audio.play(f.audioSrc, null);
  };

  // ── sanctuary handlers ──
  const onConfigure = (tr) => setConfigTrack(tr);
  const onAddLayers = (tr) => {
    setConfigTrack(null);
    setMixFocus(tr);
    setTab('mixer');
    fireToast(`${tr.title} loaded into the Mixer`);
  };
  const onPreview = (tr) => {
    fireToast(`Pre-listening ${tr.title}…`);
    if (tr.audioSrc) audio.previewSrc(tr.audioSrc);
  };
  const onLoad = (tr) => {
    if (loadedIds.includes(tr.id) || loadingId) return;
    setLoadingId(tr.id);
    setTimeout(() => {
      setLoadingId(null);
      setLoadedIds(ids => [...ids, tr.id]);
      setRawAudio(ra => ra.length < 5 ? [...ra, { id: 'l-' + tr.id, name: tr.title, meta: `${tr.dur} min · loaded`, color: 'seaish', icon: 'music', grad: tr.grad, audioSrc: tr.audioSrc, pinned: false }] : ra);
      fireToast(`${tr.title} loaded to your Vault`);
    }, 1500);
  };

  // ── player handlers ──
  const togglePlay = () => {
    setIsPlaying(p => { if (p) { audio.pause(); } else { audio.play(track?.audioSrc); } return !p; });
  };
  const collapse = () => setPlayerMode('mini');
  const expand = () => setPlayerMode('full');
  const seek = (sec) => setElapsed(Math.round(sec));
  const saveRitual = () => {
    if (!track) return;
    setSavedFlash(true);
    setRituals(rs => {
      const name = `${track.title} Ritual`;
      if (rs.some(r => r.title === name)) return rs;
      return [{ id: 'sr-' + Date.now(), title: name, layers: track.sub || 'Solo track', dur: duration, grad: track.grad, audioSrc: track.audioSrc }, ...rs];
    });
    fireToast('Saved to your Rituals');
    setTimeout(() => setSavedFlash(false), 1800);
  };

  // ── mixer handlers ──
  const onPreviewMix = () => {};

  // ── vault handlers ──
  const renameRitual = (id, name) => setRituals(rs => rs.map(r => r.id === id ? { ...r, title: name } : r));
  const deleteRitual = (id) => setRituals(rs => rs.filter(r => r.id !== id));
  const togglePin = (id) => {
    setRawAudio(ra => ra.map(f => f.id === id ? { ...f, pinned: !f.pinned } : f));
    const f = rawAudio.find(x => x.id === id);
    fireToast(f && f.pinned ? 'Unpinned from Sanctuary' : 'Pinned to Sanctuary');
  };
  const deleteFile = (id) => setRawAudio(ra => ra.filter(f => f.id !== id));

  const dark = theme === 'moon';

  return (
    <IOSDevice dark={dark}>
      <div className="alma" data-theme={theme} style={{ '--accent': t.accent }}>
        <div className="scrollbody" key={tab}>
          {tab === 'sanctuary' && (
            <Sanctuary
              theme={theme} onToggleTheme={() => setTheme(tr => tr === 'moon' ? 'sun' : 'moon')}
              tracks={MASTER_TRACKS} rituals={rituals} pinned={pinned}
              onConfigure={onConfigure} onPreview={onPreview} onLoad={onLoad}
              loadingId={loadingId} loadedIds={loadedIds}
              onLaunchRitual={launchRitual} onPlayFile={playFile}
              onEditFile={onEditFile} onAddMoreRitual={() => setTab('mixer')}
              onUpgrade={() => setShowPaywall(true)}
            />
          )}
          {tab === 'mixer' && (
            <Mixer
              focus={mixFocus} setFocus={setMixFocus} dur={mixDur} setDur={setMixDur}
              layer={mixLayer} setLayer={setMixLayer}
              bell={mixBell} setBell={setMixBell}
              intervalMin={intervalMin} setIntervalMin={setIntervalMin}
              tracks={MASTER_TRACKS} onToast={fireToast}
              onPreviewLayer={() => {}}
            />
          )}
          {tab === 'vault' && (
            <Vault
              rituals={rituals} rawAudio={rawAudio}
              onRename={renameRitual} onDeleteRitual={deleteRitual}
              onTogglePin={togglePin} onDeleteFile={deleteFile} onLaunchRitual={launchRitual}
              onEditFile={onEditFile}
              onGoMixer={() => setTab('mixer')}
              onImportFile={(f) => setEditingFile({ ...f, _isNew: true })}
              onUpgrade={() => setShowPaywall(true)}
            />
          )}
        </div>

        {/* mixer launch bar (pinned, stacks above mini-player) */}
        {tab === 'mixer' && (
          <MixerActionBar
            focus={mixFocus} dur={mixDur} layer={mixLayer} bell={mixBell}
            raised={playerMode === 'mini'}
            onBegin={beginSession} onPreviewMix={onPreviewMix}
          />
        )}

        {/* mini-player (above tab bar) */}
        <MiniPlayer
          track={track} duration={duration} elapsed={elapsed} isPlaying={isPlaying}
          mode={playerMode} onExpand={expand} onTogglePlay={togglePlay}
          onClose={() => { audio.stop(); setPlayerMode('closed'); }}
        />

        {/* tab bar */}
        <TabBar active={tab} onChange={setTab} />

        {/* quick-config sheet */}
        <QuickConfigSheet
          track={configTrack} onClose={() => setConfigTrack(null)}
          onBegin={beginSession} onAddLayers={onAddLayers}
        />

        {/* pin file customizer sheet */}
        <PinCustomizerSheet
          file={editingFile} onClose={() => setEditingFile(null)}
          onSave={onSavePinCustomization}
        />

        {/* full player deck */}
        <FullPlayer
          track={track} duration={duration} elapsed={elapsed} isPlaying={isPlaying}
          muted={muted} mode={playerMode} savedFlash={savedFlash} motion={t.mandalaMotion}
          canSaveRitual={sessionSource === 'mixer'}
          onTogglePlay={togglePlay} onCollapse={collapse} onSeek={seek}
          onCustomize={() => track && setConfigTrack(track)}
          onToggleMute={() => setMuted(m => !m)}
          onSaveRitual={saveRitual}
        />

        {/* paywall */}
        <PaywallSheet open={showPaywall} onClose={() => setShowPaywall(false)} />

        {/* toast */}
        <Toast message={toast} />

        {/* tweaks */}
        <TweaksPanel>
          <TweakSection label="Theme" />
          <TweakRadio label="Mode" value={theme} options={['moon', 'sun']} onChange={setTheme} />
          <TweakSection label="Brand" />
          <TweakColor label="Accent" value={t.accent} options={ACCENTS} onChange={(v) => setTweak('accent', v)} />
          <TweakToggle label="Mandala motion" value={t.mandalaMotion} onChange={(v) => setTweak('mandalaMotion', v)} />
        </TweaksPanel>
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
  <script>
    function fitStage() {
      const s = document.getElementById('stage'); if (!s) return;
      const pad = 32;
      const sc = Math.min((innerWidth-pad)/402, (innerHeight-pad)/874, 1);
      s.style.transform = `scale(${sc})`;
    }
    addEventListener('resize', fitStage); fitStage(); setTimeout(fitStage, 300);
  </script>
</body>
</html>
