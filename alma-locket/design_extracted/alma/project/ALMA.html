<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALMA</title>
<link rel="stylesheet" href="alma/alma.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body {
    background:
      radial-gradient(120% 90% at 50% 0%, #2a2622 0%, #1a1714 55%, #100e0c 100%);
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; box-sizing: border-box;
    font-family: 'Outfit', system-ui, sans-serif;
  }
  #stage { transform-origin: center center; }
</style>
</head>
<body>
  <div id="stage">
    <div id="root"></div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="alma/ios-frame.jsx"></script>
  <script type="text/babel" src="alma/tweaks-panel.jsx"></script>
  <script type="text/babel" src="alma/icons.jsx"></script>
  <script type="text/babel" src="alma/data.jsx"></script>
  <script type="text/babel" src="alma/components.jsx"></script>
  <script type="text/babel" src="alma/mandala.jsx"></script>
  <script type="text/babel" src="alma/player.jsx"></script>
  <script type="text/babel" src="alma/sanctuary.jsx"></script>
  <script type="text/babel" src="alma/mixer.jsx"></script>
  <script type="text/babel" src="alma/vault.jsx"></script>
  <script type="text/babel" src="alma/pin-customizer.jsx"></script>
  <script type="text/babel" src="alma/app.jsx"></script>

  <script>
    // fit the 402×874 device into the viewport
    function fitStage() {
      const stage = document.getElementById('stage');
      if (!stage) return;
      const pad = 32;
      const s = Math.min((innerWidth - pad) / 402, (innerHeight - pad) / 874, 1);
      stage.style.transform = `scale(${s})`;
    }
    addEventListener('resize', fitStage);
    fitStage();
    // re-fit once fonts/layout settle
    setTimeout(fitStage, 300);
  </script>
</body>
</html>
