<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALMA — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #4839F4;
  --accent-press: #6350F5;
  --font: 'Outfit', -apple-system, system-ui, sans-serif;
  --font-logo: 'Montserrat', sans-serif;
  --ease: cubic-bezier(0.4, 0.0, 0.1, 1);
  --ease-spring: cubic-bezier(0.34, 1.3, 0.64, 1);
  --bg: #0B0A09;
  --text: #F4F1EC;
  --text-2: #ACA59D;
  --text-3: #837C73;
  --hairline: rgba(255,255,255,0.08);
  --hairline-strong: rgba(255,255,255,0.14);
  --surface: rgba(22, 18, 16, 0.72);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  width: 100%;
}

body {
  font-family: var(--font);
  background: #0B0A09;
  color: var(--text);
  display: flex;
  flex-direction: column;
  min-height: 100svh;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
  position: relative;
}

/* ── Ambient glows ── */
.aura {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.aura-blob {
  position: absolute;
  border-radius: 50%;
  filter: blur(90px);
  will-change: transform, opacity;
}
.aura-blob-1 {
  width: 340px; height: 340px;
  background: rgba(243, 188, 200, 0.10);
  top: 5%; left: 50%;
  transform: translateX(-50%);
  animation: glowDrift1 14s infinite ease-in-out;
}
.aura-blob-2 {
  width: 400px; height: 400px;
  background: rgba(72, 57, 244, 0.13);
  top: -10%; left: 42%;
  transform: translateX(-50%);
  animation: glowDrift2 18s infinite ease-in-out;
}
@keyframes glowDrift1 {
  0%,100% { transform: translateX(-50%) scale(1); opacity:.35; }
  40%      { transform: translateX(-50%) scale(1.1) translate(16px,-22px); opacity:.45; }
  70%      { transform: translateX(-50%) scale(.93) translate(-10px,16px); opacity:.25; }
}
@keyframes glowDrift2 {
  0%,100% { transform: translateX(-50%) scale(1.05); opacity:.22; }
  50%      { transform: translateX(-50%) scale(.9) translate(-24px,10px); opacity:.32; }
}

/* ── Main layout: logo top, card bottom ── */
.screen {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
  flex: 1;
  padding: 72px 24px 40px;
  animation: screenIn 500ms var(--ease-spring) both;
}
@keyframes screenIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── Brand section (top) ── */
.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}

.lotus-wrap {
  position: relative;
  width: 100px; height: 100px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 18px;
}
.lotus-glow {
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(243,188,200,0.18) 0%, transparent 70%);
  animation: lotusPulse 3.5s ease-in-out infinite;
}
@keyframes lotusPulse {
  0%,100% { opacity:.7; transform:scale(1); }
  50%      { opacity:1; transform:scale(1.12); }
}

.brand-name {
  font-family: var(--font-logo);
  font-weight: 300;
  font-size: 30px;
  letter-spacing: 0.28em;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
  margin-bottom: 8px;
}
.brand-tagline {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-3);
  letter-spacing: 0.04em;
}

/* ── Bottom card ── */
.card {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--hairline);
  border-radius: 28px;
  padding: 28px 24px 24px;
  position: relative;
  overflow: hidden;
}

.card-heading {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  margin-bottom: 4px;
}
.card-sub {
  font-size: 12px;
  color: var(--text-3);
  text-align: center;
  margin-bottom: 20px;
  line-height: 1.5;
}

/* ── Google button ── */
.btn-google {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 15px 20px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.02em;
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 28px rgba(72, 57, 244, 0.4);
  transition: background 180ms var(--ease), box-shadow 180ms var(--ease), transform 120ms var(--ease);
  -webkit-tap-highlight-color: transparent;
  margin-bottom: 18px;
}
.btn-google:hover {
  background: var(--accent-press);
  box-shadow: 0 0 40px rgba(72, 57, 244, 0.55);
}
.btn-google:active { transform: scale(0.97); }

.google-icon-wrap {
  width: 20px; height: 20px;
  background: #fff;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* ── Legal ── */
.legal {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  cursor: pointer;
}
.legal-checkbox { position: relative; flex-shrink: 0; margin-top: 1px; }
.legal-checkbox input { position: absolute; opacity:0; width:0; height:0; }
.legal-box {
  width: 17px; height: 17px;
  border-radius: 5px;
  border: 1.5px solid var(--hairline-strong);
  background: rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: center;
  transition: background 150ms var(--ease), border-color 150ms var(--ease);
}
.legal-checkbox input:checked + .legal-box {
  background: var(--accent);
  border-color: var(--accent);
}
.legal-text {
  font-size: 11px;
  color: var(--text-3);
  line-height: 1.6;
}
.legal-text a { color: var(--text-2); text-decoration: underline; text-underline-offset: 2px; }

/* ── Footer ── */
.footer {
  margin-top: 20px;
  font-size: 11px;
  color: var(--text-3);
  text-align: center;
}
.footer a { color: var(--text-2); text-decoration: underline; text-underline-offset: 2px; }

/* ── Loading overlay ── */
.loading-overlay {
  position: absolute;
  inset: 0;
  border-radius: 28px;
  background: rgba(14, 11, 9, 0.96);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  z-index: 10;
}
.loading-overlay.active { display: flex; animation: fadeIn 200ms var(--ease); }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.spinner {
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-top-color: var(--accent);
  animation: spin 800ms linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.loading-title { font-size: 14px; font-weight: 600; color: var(--text); }
.loading-sub   { font-size: 12px; color: var(--text-3); margin-top: -4px; }

.success-icon {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(72,57,244,0.15);
  border: 1.5px solid rgba(72,57,244,0.35);
  display: flex; align-items: center; justify-content: center;
  color: var(--accent);
}
</style>
</head>
<body>

  <div class="aura">
    <div class="aura-blob aura-blob-1"></div>
    <div class="aura-blob aura-blob-2"></div>
  </div>

  <div class="screen">

    <!-- Brand: logo + name + tagline -->
    <div class="brand">
      <div class="lotus-wrap">
        <div class="lotus-glow"></div>
        <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Back center petal -->
          <path d="M50 15C53 32 63 42 66 58C69 74 61 80 50 82C39 80 31 74 34 58C37 42 47 32 50 15Z" fill="url(#g-back)" />
          <!-- Left outer petal -->
          <path d="M48 20C36 32 24 45 28 62C31 74 42 78 48 79C42 70 41 55 48 38V20Z" fill="url(#g-left)" />
          <!-- Right outer petal -->
          <path d="M52 20C64 32 76 45 72 62C69 74 58 78 52 79C58 70 59 55 52 38V20Z" fill="url(#g-right)" />
          <!-- Far left spread petal -->
          <path d="M46 28C30 36 18 52 22 68C25 78 38 80 46 78C38 68 38 52 46 36V28Z" fill="url(#g-far-left)" opacity="0.85"/>
          <!-- Far right spread petal -->
          <path d="M54 28C70 36 82 52 78 68C75 78 62 80 54 78C62 68 62 52 54 36V28Z" fill="url(#g-far-right)" opacity="0.85"/>
          <!-- Front bud -->
          <path d="M50 30C45 42 40 55 42 68C44 76 48 81 50 82C52 81 56 76 58 68C60 55 55 42 50 30Z" fill="url(#g-front)" />
          <defs>
            <linearGradient id="g-back" x1="50" y1="15" x2="50" y2="82" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FCDCE2"/>
              <stop offset="50%" stop-color="#F2A5B8"/>
              <stop offset="100%" stop-color="#D16E87"/>
            </linearGradient>
            <linearGradient id="g-left" x1="24" y1="20" x2="48" y2="79" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FCE1E6"/>
              <stop offset="60%" stop-color="#EB92A7"/>
              <stop offset="100%" stop-color="#AE425C"/>
            </linearGradient>
            <linearGradient id="g-right" x1="76" y1="20" x2="52" y2="79" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FCE1E6"/>
              <stop offset="60%" stop-color="#EB92A7"/>
              <stop offset="100%" stop-color="#AE425C"/>
            </linearGradient>
            <linearGradient id="g-far-left" x1="18" y1="28" x2="46" y2="80" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FDE8ED"/>
              <stop offset="100%" stop-color="#C46880"/>
            </linearGradient>
            <linearGradient id="g-far-right" x1="82" y1="28" x2="54" y2="80" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FDE8ED"/>
              <stop offset="100%" stop-color="#C46880"/>
            </linearGradient>
            <linearGradient id="g-front" x1="50" y1="30" x2="50" y2="82" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stop-color="#FFF2F4"/>
              <stop offset="100%" stop-color="#DF7E96"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="brand-name">Alma</div>
      <div class="brand-tagline">A quiet place for your sound.</div>
    </div>

    <!-- Card: sign-in actions -->
    <div class="card">

      <!-- Loading overlay inside card -->
      <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner" id="loadingSpinner"></div>
        <div class="loading-title" id="loadingTitle">Connecting to sanctuary…</div>
        <div class="loading-sub">Syncing your saved rituals and mixes</div>
      </div>

      <div class="card-heading">Access Your Sanctuary</div>
      <div class="card-sub">Instantly sync your saved rituals and custom sounds.</div>

      <button class="btn-google" onclick="handleSignIn()">
        <span class="google-icon-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24">
            <path fill="#EA4335" d="M12 5.04c1.64 0 3.12.56 4.28 1.67l3.2-3.2C17.52 1.58 14.97 1 12 1 7.35 1 3.4 3.65 1.51 7.5l3.86 3C6.27 7.57 8.9 5.04 12 5.04z"/>
            <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.44c-.28 1.47-1.11 2.72-2.36 3.56l3.66 2.84c2.14-1.97 3.75-4.88 3.75-8.55z"/>
            <path fill="#FBBC05" d="M5.37 14.5a7.12 7.12 0 0 1 0-4.52l-3.86-3a11.96 11.96 0 0 0 0 10.51l3.86-2.99z"/>
            <path fill="#34A853" d="M12 19c-3.1 0-5.73-2.53-6.63-5.5l-3.86 3C3.4 20.35 7.35 23 12 23c2.97 0 5.48-.98 7.31-2.67l-3.66-2.84c-1.01.67-2.3 1.51-3.65 1.51z"/>
          </svg>
        </span>
        Continue with Google
      </button>

      <label class="legal">
        <span class="legal-checkbox">
          <input type="checkbox" id="legalCheck" checked />
          <span class="legal-box">
            <svg width="9" height="9" viewBox="0 0 10 10" fill="none">
              <path d="M1.5 5L4 7.5L8.5 2.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </span>
        <span class="legal-text">
          I consent to the processing of my profile data to customize soundscapes.
          Read our <a href="#">Privacy Policy</a>.
        </span>
      </label>

      <div class="footer">
        Need help? <a href="#">Contact Alma Sanctuary Support</a>
      </div>
    </div>

  </div>

<script>
  function handleSignIn() {
    if (!document.getElementById('legalCheck').checked) {
      const btn = document.querySelector('.btn-google');
      [6, -6, 4, 0].forEach((x, i) =>
        setTimeout(() => btn.style.transform = x ? `translateX(${x}px)` : '', i * 90)
      );
      return;
    }

    const overlay  = document.getElementById('loadingOverlay');
    const spinner  = document.getElementById('loadingSpinner');
    const title    = document.getElementById('loadingTitle');

    overlay.classList.add('active');

    setTimeout(() => { title.textContent = 'Verifying credentials…'; }, 1100);

    setTimeout(() => {
      spinner.style.display = 'none';
      const icon = document.createElement('div');
      icon.className = 'success-icon';
      icon.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      spinner.parentNode.insertBefore(icon, spinner);
      title.textContent = 'Entrance approved';
    }, 2400);

    setTimeout(() => { localStorage.setItem('alma_onboarded', '1'); window.location.href = 'ALMA.html'; }, 3400);
  }
</script>
</body>
</html>
