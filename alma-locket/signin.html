<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ALMA — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --accent: #4839F4;
  --font: 'Outfit', -apple-system, system-ui, sans-serif;
  --ease: cubic-bezier(0.4, 0.0, 0.1, 1);
  --ease-spring: cubic-bezier(0.34, 1.3, 0.64, 1);
  --bg-grad: radial-gradient(130% 90% at 50% 8%, #221C19 0%, #161210 42%, #0C0A08 100%);
  --text: #F4F1EC;
  --text-2: #A8AAAF;
  --text-3: #7A7D85;
  --hairline: rgba(255,255,255,0.085);
  --hairline-strong: rgba(255,255,255,0.14);
  --surface: rgba(255,255,255,0.045);
  --surface-2: rgba(255,255,255,0.07);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; width: 100%; overflow: hidden; }

body {
  font-family: var(--font);
  background: var(--bg-grad);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

/* ── Screen track ── */
.track {
  display: flex;
  width: 200%;
  height: 100svh;
  transition: transform 400ms var(--ease);
}
.track.at-2 { transform: translateX(-50%); }

.screen {
  width: 50%;
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 60px 24px 40px;
  flex-shrink: 0;
}

/* ── Brand ── */
.brand {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}
.lotus-img {
  width: 160px;
  height: 180px;
  object-fit: contain;
  margin-bottom: 20px;
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1);    opacity: 1; }
  50%       { transform: scale(1.03); opacity: 0.88; }
}
.brand-name {
  font-weight: 600;
  font-size: 34px;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--text);
  line-height: 1;
  margin-bottom: 8px;
}
.brand-tagline {
  font-size: 16px;
  font-weight: 400;
  color: var(--text-3);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

/* ── Auth section ── */
.auth {
  margin-top: auto;
  width: 100%;
}

.btn-provider {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  padding: 15px 20px;
  border-radius: 100px;
  border: 1px solid var(--hairline);
  background: var(--surface);
  color: var(--text);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.02em;
  cursor: pointer;
  transition: opacity 120ms var(--ease);
  -webkit-tap-highlight-color: transparent;
  margin-bottom: 12px;
}
.btn-provider:active { opacity: 0.55; }

.divider {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 4px 0 16px;
  color: var(--text-3);
  font-size: 16px;
  font-weight: 500;
}
.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--hairline);
}

.input-field {
  width: 100%;
  padding: 14px 16px;
  background: var(--surface-2);
  border: 1px solid var(--hairline);
  border-radius: 14px;
  color: var(--text);
  font-family: var(--font);
  font-size: 16px;
  font-weight: 400;
  outline: none;
  margin-bottom: 10px;
  transition: border-color 200ms var(--ease);
  -webkit-appearance: none;
}
.input-field:focus { border-color: var(--hairline-strong); }
.input-field::placeholder { color: var(--text-3); }

.btn-primary {
  width: 100%;
  padding: 15px 20px;
  border-radius: 100px;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  background: var(--accent);
  color: #fff;
  box-shadow: 0 0 24px rgba(72,57,244,0.35);
  transition: opacity 120ms var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.btn-primary:active { opacity: 0.75; }

.legal {
  margin-top: 20px;
  font-size: 16px;
  color: var(--text-3);
  text-align: center;
  line-height: 1.6;
}
.legal a {
  color: var(--text-2);
  text-decoration: underline;
  text-underline-offset: 2px;
}

/* ── Screen 2 specific ── */
.back-btn {
  position: absolute;
  top: 56px;
  left: 20px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--hairline);
  background: var(--surface);
  color: var(--text-2);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: opacity 120ms var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.back-btn:active { opacity: 0.55; }

.email-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 12px;
  border-radius: 100px;
  border: 1px solid var(--hairline);
  background: var(--surface);
  font-size: 14px;
  font-weight: 500;
  color: var(--text-2);
  margin-bottom: 20px;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── Full-screen loading overlay ── */
.loading-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-grad);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.loading-overlay.active { display: flex; animation: fadeIn 300ms var(--ease); }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.loading-content {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  text-align: center;
  padding: 0 32px;
}

.loading-icon {
  width: 72px; height: 72px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.mandala-spin {
  width: 72px; height: 72px;
  object-fit: contain;
  animation: spinCW 90s linear infinite;
  transition: opacity 500ms ease;
}
.mandala-spin.fade-out { opacity: 0; }

.check-icon {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  color: var(--text);
  opacity: 0;
  transition: opacity 500ms ease;
}
.check-icon.fade-in { opacity: 1; }

@keyframes spinCW { to { transform: rotate(360deg); } }

.loading-title { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1.2; }
.loading-sub   { font-size: 16px; color: var(--text-3); margin-top: -8px; }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-content">
    <div class="loading-icon">
      <img src="images/mandala/mandala 1.svg" class="mandala-spin" id="mandalaSpin" alt="" />
      <div class="check-icon" id="checkIcon">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
    </div>
    <div class="loading-title" id="loadingTitle">Connecting to sanctuary…</div>
    <div class="loading-sub">Syncing your saved rituals and mixes</div>
  </div>
</div>

<div class="track" id="track">

  <!-- ── Screen 1: Entry ── -->
  <div class="screen">
    <div class="brand">
      <img src="images/lotus/lotus7.webp" alt="Lotus" class="lotus-img" />
      <div class="brand-name">Alma</div>
      <div class="brand-tagline">A quiet place for your sound.</div>
    </div>

    <div class="auth">
      <button class="btn-provider" onclick="handleGoogle()">
        <svg width="18" height="18" viewBox="0 0 24 24">
          <path fill="#EA4335" d="M12 5.04c1.64 0 3.12.56 4.28 1.67l3.2-3.2C17.52 1.58 14.97 1 12 1 7.35 1 3.4 3.65 1.51 7.5l3.86 3C6.27 7.57 8.9 5.04 12 5.04z"/>
          <path fill="#4285F4" d="M23.49 12.27c0-.81-.07-1.59-.2-2.36H12v4.51h6.44c-.28 1.47-1.11 2.72-2.36 3.56l3.66 2.84c2.14-1.97 3.75-4.88 3.75-8.55z"/>
          <path fill="#FBBC05" d="M5.37 14.5a7.12 7.12 0 0 1 0-4.52l-3.86-3a11.96 11.96 0 0 0 0 10.51l3.86-2.99z"/>
          <path fill="#34A853" d="M12 19c-3.1 0-5.73-2.53-6.63-5.5l-3.86 3C3.4 20.35 7.35 23 12 23c2.97 0 5.48-.98 7.31-2.67l-3.66-2.84c-1.01.67-2.3 1.51-3.65 1.51z"/>
        </svg>
        Continue with Google
      </button>

      <div class="divider">or</div>

      <input
        class="input-field"
        id="emailInput"
        type="email"
        placeholder="Your email address"
        autocomplete="email"
      />

      <button class="btn-primary" onclick="goToPassword()">
        Continue with Email
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>

      <p class="legal">
        By continuing you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>
    </div>
  </div>

  <!-- ── Screen 2: Password ── -->
  <div class="screen" style="position: relative;">
    <button class="back-btn" onclick="goBack()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>

    <div class="brand">
      <img src="images/lotus/lotus7.webp" alt="Lotus" class="lotus-img" />
      <div class="brand-name">Alma</div>
      <div class="brand-tagline">A quiet place for your sound.</div>
    </div>

    <div class="auth">
      <div class="email-pill" id="emailPill">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <span id="emailPillText"></span>
      </div>

      <input
        class="input-field"
        id="passwordInput"
        type="password"
        placeholder="Create a password"
        autocomplete="new-password"
      />

      <button class="btn-primary" onclick="handleSignUp()">
        Join ALMA
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>

      <p class="legal">
        By continuing you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
      </p>
    </div>
  </div>

</div>

<script>
  const track = document.getElementById('track');

  function goToPassword() {
    const email = document.getElementById('emailInput').value.trim();
    if (!email || !email.includes('@')) {
      const input = document.getElementById('emailInput');
      input.style.borderColor = 'rgba(255,255,255,0.3)';
      input.focus();
      setTimeout(() => input.style.borderColor = '', 1200);
      return;
    }
    document.getElementById('emailPillText').textContent = email;
    track.classList.add('at-2');
    setTimeout(() => document.getElementById('passwordInput').focus(), 420);
  }

  function goBack() {
    track.classList.remove('at-2');
    setTimeout(() => document.getElementById('emailInput').focus(), 420);
  }

  function handleGoogle() {
    showLoading('google');
  }

  function handleSignUp() {
    const password = document.getElementById('passwordInput').value;
    if (password.length < 6) {
      const input = document.getElementById('passwordInput');
      input.style.borderColor = 'rgba(255,255,255,0.3)';
      input.focus();
      setTimeout(() => input.style.borderColor = '', 1200);
      return;
    }
    showLoading('email');
  }

  function showLoading(method) {
    const overlay  = document.getElementById('loadingOverlay');
    const mandala  = document.getElementById('mandalaSpin');
    const check    = document.getElementById('checkIcon');
    const title    = document.getElementById('loadingTitle');

    overlay.classList.add('active');
    setTimeout(() => { title.textContent = 'Verifying credentials…'; }, 1100);
    setTimeout(() => {
      mandala.classList.add('fade-out');
      setTimeout(() => check.classList.add('fade-in'), 300);
      title.textContent = 'Entrance approved';
    }, 2400);
    setTimeout(() => {
      localStorage.setItem('alma_onboarded', '1');
      window.location.href = 'ALMA.html';
    }, 3400);
  }

  // Allow Enter key to advance
  document.getElementById('emailInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') goToPassword();
  });
  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSignUp();
  });
</script>
</body>
</html>
